name: build-cleancentive-image

on:
  push:
    branches: [cleancentive-customizations]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image (with our source patched in)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/cleancentive/outline-base:${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Build runner image and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            BASE_IMAGE=ghcr.io/cleancentive/outline-base:${{ github.sha }}
          push: true
          tags: |
            ghcr.io/cleancentive/outline:${{ github.sha }}
            ghcr.io/cleancentive/outline:latest
          cache-from: type=gha,scope=runner
          cache-to: type=gha,scope=runner,mode=max
